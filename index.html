<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Promptly — Your Prompt Library</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --font: 'Plus Jakarta Sans', system-ui, sans-serif;
  --sidebar-w: 216px;
  --top-h: 58px;

  --bg:          #FAF9F7;
  --surface:     #FFFFFF;
  --surface-2:   #F4F2EE;
  --border:      rgba(0,0,0,0.07);
  --border-md:   rgba(0,0,0,0.12);

  --text:        #1A1A18;
  --text-2:      #5C5C58;
  --text-3:      #9A9A94;

  --accent:      #CF6132;
  --accent-light:#FDF3EE;
  --accent-dark: #A84D26;
}

html, body { height: 100%; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
}

/* ─── Topbar ─── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: var(--top-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 18px 0 0;
  gap: 14px;
}

.brand {
  width: var(--sidebar-w);
  padding: 0 18px;
  display: flex;
  align-items: center;
  gap: 9px;
  flex-shrink: 0;
}

.brand-name {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.3px;
  color: var(--text);
}

.search-box {
  flex: 1;
  max-width: 580px;
  position: relative;
}

.search-box input {
  width: 100%;
  height: 36px;
  background: var(--surface-2);
  border: 1px solid transparent;
  border-radius: 20px;
  padding: 0 14px 0 36px;
  font-family: var(--font);
  font-size: 13.5px;
  color: var(--text);
  outline: none;
  transition: all 0.18s;
}

.search-box input::placeholder { color: var(--text-3); }
.search-box input:focus {
  background: var(--surface);
  border-color: var(--border-md);
  box-shadow: 0 1px 8px rgba(0,0,0,0.06);
}

.search-icon {
  position: absolute;
  left: 12px; top: 50%; transform: translateY(-50%);
  pointer-events: none;
  opacity: 0.35;
}

/* ─── Layout ─── */
.layout {
  display: flex;
  padding-top: var(--top-h);
  min-height: 100vh;
}

/* ─── Sidebar ─── */
.sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  position: fixed;
  top: var(--top-h); bottom: 0; left: 0;
  overflow-y: auto;
  border-right: 1px solid var(--border);
  background: var(--surface);
  padding: 12px 0 24px;
}

.nav-section {
  font-size: 10.5px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.09em;
  color: var(--text-3);
  padding: 0 18px;
  margin: 14px 0 5px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 7px 14px;
  border-radius: 0 22px 22px 0;
  margin-right: 10px;
  cursor: pointer;
  font-size: 13.5px;
  color: var(--text-2);
  user-select: none;
  transition: background 0.1s, color 0.1s;
}

.nav-item:hover { background: var(--surface-2); color: var(--text); }

.nav-item.active {
  background: var(--accent-light);
  color: var(--accent-dark);
  font-weight: 500;
}

.nav-dot {
  width: 9px; height: 9px;
  border-radius: 2.5px;
  flex-shrink: 0;
}

.nav-count {
  margin-left: auto;
  font-size: 11px;
  color: var(--text-3);
}

.nav-divider {
  height: 1px;
  background: var(--border);
  margin: 8px 16px;
}

/* ─── Main ─── */
.main {
  margin-left: var(--sidebar-w);
  flex: 1;
  padding: 28px 26px 100px;
  min-width: 0;
}

.view-header {
  display: flex;
  align-items: baseline;
  gap: 9px;
  margin-bottom: 22px;
}

.view-title {
  font-size: 19px;
  font-weight: 600;
  letter-spacing: -0.4px;
}

.view-meta {
  font-size: 12.5px;
  color: var(--text-3);
}

/* ─── Grid ─── */
.grid {
  columns: 3;
  column-gap: 14px;
}

@media (max-width: 1180px) { .grid { columns: 2; } }
@media (max-width: 680px)  { .grid { columns: 1; } }

/* ─── Card ─── */
.card {
  break-inside: avoid;
  background: var(--surface);
  border: 1px solid var(--border-md);
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 14px;
  cursor: pointer;
  transition: box-shadow 0.15s, transform 0.12s, border-color 0.15s;
  position: relative;
}

.card:hover {
  box-shadow: 0 4px 18px rgba(0,0,0,0.08);
  transform: translateY(-1px);
  border-color: rgba(0,0,0,0.16);
}

.card-accent {
  position: absolute;
  left: 0; top: 12px; bottom: 12px;
  width: 3px;
  border-radius: 0 3px 3px 0;
}

.card-title {
  font-size: 13.5px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 7px;
  letter-spacing: -0.15px;
  padding-left: 10px;
}

.card-body {
  font-size: 12.5px;
  color: var(--text-2);
  line-height: 1.65;
  padding-left: 10px;
  display: -webkit-box;
  -webkit-line-clamp: 4;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 12px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}

.cat-pill {
  font-size: 10.5px;
  font-weight: 500;
  padding: 3px 8px;
  border-radius: 20px;
  letter-spacing: 0.01em;
}

.copy-btn {
  font-family: var(--font);
  font-size: 11.5px;
  padding: 4px 11px;
  border-radius: 20px;
  border: 1px solid var(--border-md);
  background: transparent;
  color: var(--text-2);
  cursor: pointer;
  transition: all 0.13s;
}

.copy-btn:hover { background: var(--surface-2); color: var(--text); }
.copy-btn.ok { border-color: #86C98A; color: #2A7A2F; background: #F2FAF2; }

/* ─── FAB ─── */
.fab {
  position: fixed;
  bottom: 26px; right: 26px;
  width: 48px; height: 48px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 50%;
  font-size: 22px; line-height: 1;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 18px rgba(207,97,50,0.38);
  z-index: 200;
  transition: transform 0.13s, box-shadow 0.13s;
}

.fab:hover { transform: scale(1.07); box-shadow: 0 6px 22px rgba(207,97,50,0.45); }

/* ─── Empty state ─── */
.empty {
  padding: 56px 20px;
  text-align: center;
}

.empty strong { display: block; font-size: 15px; font-weight: 600; color: var(--text-2); margin-bottom: 5px; }
.empty span   { font-size: 13px; color: var(--text-3); }

/* ─── Overlay + Modal ─── */
.overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(26,26,24,0.38);
  z-index: 400;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(2px);
}

.overlay.open { display: flex; }

.modal {
  background: var(--surface);
  border-radius: 16px;
  width: 100%; max-width: 520px;
  padding: 22px 24px 20px;
  box-shadow: 0 16px 48px rgba(0,0,0,0.16);
  border: 1px solid var(--border-md);
}

.modal-title {
  width: 100%;
  font-family: var(--font);
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  border: none; outline: none; background: transparent;
  margin-bottom: 10px;
  letter-spacing: -0.2px;
}

.modal-title::placeholder { color: var(--text-3); font-weight: 400; }

.modal-body {
  width: 100%;
  font-family: var(--font);
  font-size: 13px;
  color: var(--text-2);
  line-height: 1.7;
  border: none; outline: none; background: transparent;
  resize: none;
  min-height: 120px;
}

.modal-body::placeholder { color: var(--text-3); }

.modal-divider { height: 1px; background: var(--border); margin: 14px 0; }

.modal-footer {
  display: flex; align-items: center; gap: 8px;
}

.modal-footer select {
  font-family: var(--font);
  font-size: 12.5px;
  color: var(--text-2);
  border: 1px solid var(--border-md);
  border-radius: 8px;
  padding: 6px 10px;
  background: transparent;
  outline: none; cursor: pointer;
}

.modal-actions { display: flex; gap: 7px; margin-left: auto; }

.btn {
  font-family: var(--font);
  font-size: 13px;
  padding: 7px 14px;
  border-radius: 9px;
  cursor: pointer;
  transition: all 0.12s;
  border: 1px solid transparent;
}

.btn-ghost  { border-color: var(--border-md); background: transparent; color: var(--text-2); }
.btn-ghost:hover  { background: var(--surface-2); color: var(--text); }
.btn-del    { border-color: #FFCDD2; background: transparent; color: #C62828; }
.btn-del:hover    { background: #FFF5F5; }
.btn-save   { background: var(--accent); color: white; font-weight: 500; border-color: var(--accent); }
.btn-save:hover   { background: var(--accent-dark); border-color: var(--accent-dark); }

/* ─── Toast ─── */
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: var(--text); color: white;
  font-family: var(--font); font-size: 13px;
  padding: 9px 18px; border-radius: 24px;
  z-index: 600; opacity: 0; pointer-events: none;
  transition: transform 0.25s cubic-bezier(.34,1.56,.64,1), opacity 0.25s;
  white-space: nowrap;
}

.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
</style>
</head>
<body>

<!-- ── Topbar ── -->
<header class="topbar">
  <div class="brand">
    <!-- Book mascot logo - Finder-inspired -->
    <svg width="30" height="30" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Book body shadow -->
      <rect x="5" y="4" width="24" height="26" rx="3.5" fill="rgba(0,0,0,0.07)"/>
      <!-- Book pages (main body) -->
      <rect x="4" y="3" width="24" height="26" rx="3.5" fill="#F5EDD6"/>
      <!-- Spine -->
      <rect x="4" y="3" width="8" height="26" rx="3.5" fill="#CF6132"/>
      <!-- Spine right square fill -->
      <rect x="9" y="3" width="3" height="26" fill="#CF6132"/>
      <!-- Spine highlight -->
      <rect x="5" y="5" width="1.5" height="22" rx="0.75" fill="rgba(255,255,255,0.25)"/>
      <!-- Page edge lines -->
      <rect x="24" y="5" width="2" height="22" rx="1" fill="rgba(0,0,0,0.06)"/>
      <!-- Left eye -->
      <circle cx="16.5" cy="13.5" r="3" fill="white"/>
      <circle cx="17.3" cy="14.2" r="1.5" fill="#1A1A18"/>
      <circle cx="17.9" cy="13.5" r="0.55" fill="white"/>
      <!-- Right eye -->
      <circle cx="24.5" cy="13.5" r="3" fill="white"/>
      <circle cx="25.3" cy="14.2" r="1.5" fill="#1A1A18"/>
      <circle cx="25.9" cy="13.5" r="0.55" fill="white"/>
      <!-- Blush left -->
      <ellipse cx="14.8" cy="18" rx="1.8" ry="1.1" fill="#F4A581" opacity="0.55"/>
      <!-- Blush right -->
      <ellipse cx="27.2" cy="18" rx="1.8" ry="1.1" fill="#F4A581" opacity="0.55"/>
      <!-- Smile -->
      <path d="M 14.5 19.5 Q 20.5 24.5 27.5 19.5" stroke="#1A1A18" stroke-width="1.4" stroke-linecap="round" fill="none"/>
    </svg>
    <div>
      <div class="brand-name">Promptly</div>
      <div style="font-size:10.5px;color:var(--text-3);font-weight:400;letter-spacing:0;margin-top:1px;">Your Prompt Library</div>
    </div>
  </div>

  <div class="search-box">
    <svg class="search-icon" width="14" height="14" viewBox="0 0 14 14" fill="none">
      <circle cx="5.5" cy="5.5" r="4.2" stroke="currentColor" stroke-width="1.5"/>
      <path d="M9 9L13 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <input id="search" type="text" placeholder="Search prompts..." oninput="render()">
  </div>
</header>

<!-- ── Layout ── -->
<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main">
    <div class="view-header">
      <span class="view-title" id="view-title">All prompts</span>
      <span class="view-meta" id="view-meta"></span>
    </div>
    <div class="grid" id="grid"></div>
  </main>
</div>

<!-- FAB -->
<button class="fab" onclick="openModal(null)" title="New prompt">+</button>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="onOverlay(event)">
  <div class="modal">
    <input class="modal-title" id="m-title" type="text" placeholder="Prompt name...">
    <textarea class="modal-body" id="m-body" placeholder="Paste or type your prompt here..."></textarea>
    <div class="modal-divider"></div>
    <div class="modal-footer">
      <select id="m-cat">
        <option value="epistemic">Epistemic</option>
        <option value="structural">Structural</option>
        <option value="career">Career</option>
        <option value="pressure">Pressure-test</option>
        <option value="synthesis">Synthesis</option>
        <option value="chaotic">Chaotic</option>
      </select>
      <div class="modal-actions">
        <button class="btn btn-del" id="btn-del" onclick="deletePrompt()">Delete</button>
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-save" onclick="savePrompt()">Save</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ── Category config ── */
const CATS = {
  epistemic:  { label:'Epistemic',     dot:'#9575CD', bg:'#EDE7F6', fg:'#4527A0' },
  structural: { label:'Structural',    dot:'#64B5F6', bg:'#E3F2FD', fg:'#0D47A1' },
  career:     { label:'Career',        dot:'#66BB6A', bg:'#E8F5E9', fg:'#1B5E20' },
  pressure:   { label:'Pressure-test', dot:'#EF9A9A', bg:'#FFEBEE', fg:'#B71C1C' },
  synthesis:  { label:'Synthesis',     dot:'#F9A825', bg:'#FFFDE7', fg:'#7A6000' },
  chaotic:    { label:'Chaotic',       dot:'#FFAB40', bg:'#FFF3E0', fg:'#BF360C' },
};

/* ── Default prompts ── */
const DEFAULTS = [
  {id:'1', cat:'epistemic',  title:'Assumption archaeology',           body:"Here is a belief I'm operating from. Don't tell me if it's right or wrong. Just excavate every assumption buried inside it and rank them by how much they're costing me."},
  {id:'2', cat:'epistemic',  title:'Socratic interrogation',           body:"Don't help me build my argument. Ask me the questions that would most destabilize it. One at a time. Keep going until my position either collapses or survives genuinely."},
  {id:'3', cat:'epistemic',  title:'Cross-domain transfer',            body:"My problem is [X]. Find 5 domains that have solved structurally similar problems — even if they look nothing like mine on the surface. For each, explain what mechanism they used and exactly how to apply that mechanism to my situation."},
  {id:'4', cat:'epistemic',  title:'Semantic compression',             body:"What are the 5–7 load-bearing ideas in [domain] — the ones where, if I deeply understood only these, I'd have 80% of the predictive power of an expert? Then explain why each one is load-bearing."},
  {id:'5', cat:'structural', title:'Work boundary diagnostic',         body:"Here is a situation at work where I'm unsure whether to step in or redirect. Don't tell me what to do. First tell me what I'd be implicitly agreeing to about my role if I stepped in — and what I'd be implicitly signaling if I didn't."},
  {id:'6', cat:'structural', title:'Emotional vs. organizational reality', body:"Here is a work situation that's bothering me. Separate what is objectively happening from what I might be adding through interpretation. Then tell me what's worth acting on and what's worth setting down."},
  {id:'7', cat:'career',     title:'Market research on your writing',  body:"You are a brand strategy hiring manager at [company]. I just sent you this piece. What does it tell you about how I think? What does it fail to prove? What would you need to see to want to meet me?"},
  {id:'8', cat:'career',     title:'Positioning stress-test',          body:"Here is how I currently describe my professional background. Rewrite it three ways: once for a brand strategy role, once for a creative strategy role, once for a strategic partnerships role. Then tell me which framing loses the least of what's actually distinctive about me."},
  {id:'9', cat:'career',     title:'Narrative gap analysis',           body:"Here is the role I'm targeting and here is my current resume or bio. Tell me specifically what a hiring manager in that role would conclude is missing — not missing from my experience, but missing from my story about my experience."},
  {id:'10',cat:'career',     title:'Intellectual outreach draft',      body:"I've been writing about [X]. This person has thought about [Y]. Find the genuine point of intersection between those two ideas, then draft an outreach message that proposes a specific question worth their time — not an ask, an intellectual move."},
  {id:'11',cat:'pressure',   title:'Pre-mortem on the transition',     body:"It's 24 months from now. I'm still in the same category — seen as a capable operator but not yet a strategist. Walk me through exactly how that happened. What did I do? What did I avoid? What did I keep waiting for?"},
  {id:'12',cat:'pressure',   title:'Red-team your narrative',          body:"You are a skeptical creative director at [target company]. I'm going to walk you through my Sony experience and make the case that I'm actually a strategist, not just a capable operator. Push back hard on every claim. Tell me what reads as strategic and what reads as execution dressed up."},
  {id:'13',cat:'pressure',   title:'Founder idea pressure-test',       body:"Here is a brand or product idea I keep returning to. Don't tell me if it's good. Tell me what would have to be true about the world for this to matter in 10 years. Then tell me which of those things are already true, which are bets, and which are wishes."},
  {id:'14',cat:'synthesis',  title:'Extract your actual thesis',       body:"Here are 3–5 pieces of writing or thinking I've produced. Don't summarize them. Find the single underlying thesis connecting all of them — the thing I'm actually arguing across everything, even if I've never stated it directly."},
  {id:'15',cat:'synthesis',  title:'Perspective multiplication',       body:"You are 5 different experts who would find serious problems with this. Give me each person's harshest, most specific critique — no softening."},
  {id:'16',cat:'chaotic',    title:'Identity channel',                 body:"Explain my situation or idea as if you're [brand / person / director]. Fully inhabit their worldview, their aesthetic, their assumptions. Don't break character. Tell me what they'd think, how they'd frame it, and what they'd do differently."},
  {id:'17',cat:'chaotic',    title:'The hostile brief',                body:"Write the brief that my strongest competitor would write to position themselves against me. Make them look good. Make their case convincing. Then tell me what would have to be true for them to be right."},
];

/* ── Storage (works standalone + extension) ── */
const DB_KEY = 'prompt_lib_v3';
const db = {
  get: () => {
    if (typeof chrome !== 'undefined' && chrome?.storage?.local) {
      return new Promise(r => chrome.storage.local.get(DB_KEY, d => r(d[DB_KEY] || null)));
    }
    try { return Promise.resolve(JSON.parse(localStorage.getItem(DB_KEY))); }
    catch { return Promise.resolve(null); }
  },
  set: (v) => {
    if (typeof chrome !== 'undefined' && chrome?.storage?.local) {
      return new Promise(r => chrome.storage.local.set({[DB_KEY]: v}, r));
    }
    try { localStorage.setItem(DB_KEY, JSON.stringify(v)); } catch {}
    return Promise.resolve();
  }
};

/* ── State ── */
let prompts = [];
let view = 'all';
let editId = null;

async function init() {
  const saved = await db.get();
  prompts = Array.isArray(saved) && saved.length ? saved : [...DEFAULTS];
  await db.set(prompts);
  render();
}

async function persist() {
  await db.set(prompts);
}

/* ── Fuzzy search ── */
function editDist(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length: m+1}, (_, i) => Array.from({length: n+1}, (_, j) => i ? (j ? 0 : i) : j));
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
  return dp[m][n];
}

function simScore(a, b) {
  if (!a || !b) return 0;
  if (a === b) return 1;
  const longer = a.length >= b.length ? a : b;
  const shorter = a.length < b.length ? a : b;
  return (longer.length - editDist(longer, shorter)) / longer.length;
}

function searchScore(query, p) {
  if (!query.trim()) return 1;
  const q   = query.toLowerCase().trim();
  const ttl = p.title.toLowerCase();
  const bdy = p.body.toLowerCase();
  const cat = (CATS[p.cat]?.label || '').toLowerCase();
  const all = `${ttl} ${bdy} ${cat}`;

  // Exact phrase
  if (ttl.includes(q)) return 100;
  if (all.includes(q)) return 75;

  const qWords = q.split(/\s+/).filter(w => w.length > 0);
  if (!qWords.length) return 0;

  // All query words present somewhere
  if (qWords.every(w => all.includes(w))) return 60 + (qWords.every(w => ttl.includes(w)) ? 10 : 0);

  let score = 0;

  // Word-level partial matches
  const allWords = all.split(/[\s\-_,\.]+/);
  for (const qw of qWords) {
    let best = 0;
    for (const aw of allWords) {
      if (!aw) continue;
      if (aw.includes(qw) || qw.includes(aw)) { best = Math.max(best, 0.9); continue; }
      if (qw.length >= 3 && aw.length >= 3) {
        const s = simScore(qw, aw.substring(0, Math.min(aw.length, qw.length + 2)));
        best = Math.max(best, s);
      }
    }
    const inTitle = ttl.split(/[\s\-_]+/).some(w => {
      if (w.includes(qw) || qw.includes(w)) return true;
      return qw.length >= 3 && simScore(qw, w) > 0.7;
    });
    score += best * (inTitle ? 25 : 12);
  }

  return score;
}

/* ── Render ── */
function render() {
  renderSidebar();
  renderGrid();
}

function renderSidebar() {
  let h = '';
  h += `<div class="nav-section">Views</div>`;
  h += navItem('all', gridIcon(), 'All prompts', prompts.length);
  h += `<div class="nav-divider"></div><div class="nav-section">Categories</div>`;
  for (const [k,c] of Object.entries(CATS)) {
    const n = prompts.filter(p => p.cat === k).length;
    h += navItem(k, `<div class="nav-dot" style="background:${c.dot}"></div>`, c.label, n);
  }
  document.getElementById('sidebar').innerHTML = h;
}

function navItem(key, icon, label, count) {
  return `<div class="nav-item ${view===key?'active':''}" onclick="setView('${key}')">${icon}<span style="flex:1">${esc(label)}</span><span class="nav-count">${count}</span></div>`;
}

function gridIcon() {
  return `<svg width="12" height="12" viewBox="0 0 12 12" fill="none" style="flex-shrink:0"><rect x=".5" y=".5" width="4.5" height="4.5" rx="1" fill="currentColor"/><rect x="7" y=".5" width="4.5" height="4.5" rx="1" fill="currentColor"/><rect x=".5" y="7" width="4.5" height="4.5" rx="1" fill="currentColor"/><rect x="7" y="7" width="4.5" height="4.5" rx="1" fill="currentColor"/></svg>`;
}

function renderGrid() {
  const q = document.getElementById('search').value;
  const title = view === 'all' ? 'All prompts' : (CATS[view]?.label || '');
  document.getElementById('view-title').textContent = title;

  let filtered = prompts.map(p => ({ p, score: searchScore(q, p) }))
    .filter(({p, score}) => {
      const matchView = view === 'all' || p.cat === view;
      return matchView && score > 0;
    })
    .sort((a,b) => b.score - a.score)
    .map(({p}) => p);

  document.getElementById('view-meta').textContent = filtered.length ? `${filtered.length} prompt${filtered.length!==1?'s':''}` : '';

  if (!filtered.length) {
    document.getElementById('grid').innerHTML = `<div class="empty"><strong>${q ? 'No matches' : 'Nothing here yet'}</strong><span>${q ? 'Try different keywords — search is flexible' : 'Hit + to add your first prompt'}</span></div>`;
    return;
  }

  document.getElementById('grid').innerHTML = filtered.map(p => {
    const c = CATS[p.cat] || CATS.epistemic;
    return `<div class="card" onclick="openModal('${p.id}')">
      <div class="card-accent" style="background:${c.dot}"></div>
      <div class="card-title">${esc(p.title)}</div>
      <div class="card-body">${esc(p.body)}</div>
      <div class="card-footer">
        <span class="cat-pill" style="background:${c.bg};color:${c.fg}">${c.label}</span>
        <button class="copy-btn" onclick="doCopy(event,'${p.id}',this)">Copy</button>
      </div>
    </div>`;
  }).join('');
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function setView(v) { view = v; render(); }

/* ── Copy ── */
function doCopy(e, id, btn) {
  e.stopPropagation();
  const p = prompts.find(x => x.id === id);
  if (!p) return;
  navigator.clipboard.writeText(p.body).then(() => {
    btn.textContent = 'Copied'; btn.classList.add('ok');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('ok'); }, 2200);
    toast('Copied to clipboard');
  });
}

/* ── Modal ── */
function openModal(id) {
  editId = id;
  const p = id ? prompts.find(x => x.id === id) : null;
  document.getElementById('m-title').value = p?.title || '';
  document.getElementById('m-body').value  = p?.body  || '';
  document.getElementById('m-cat').value   = p?.cat   || (view !== 'all' ? view : 'epistemic');
  document.getElementById('btn-del').style.display = p ? '' : 'none';
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById(p ? 'm-body' : 'm-title').focus(), 60);
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  editId = null;
}

function onOverlay(e) { if (e.target.id === 'overlay') closeModal(); }

async function savePrompt() {
  const title = document.getElementById('m-title').value.trim();
  const body  = document.getElementById('m-body').value.trim();
  const cat   = document.getElementById('m-cat').value;
  if (!title && !body) { closeModal(); return; }
  const isNew = !editId;
  if (editId) {
    const i = prompts.findIndex(x => x.id === editId);
    if (i > -1) prompts[i] = { ...prompts[i], title: title||'Untitled', body, cat };
  } else {
    prompts.push({ id: Date.now().toString(), title: title||'Untitled', body, cat });
  }
  await persist(); closeModal(); render();
  toast(isNew ? 'Prompt added' : 'Prompt updated');
}

async function deletePrompt() {
  if (!editId || !confirm('Delete this prompt?')) return;
  prompts = prompts.filter(x => x.id !== editId);
  await persist(); closeModal(); render();
  toast('Prompt deleted');
}

/* ── Toast ── */
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

/* ── Keyboard shortcuts ── */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if ((e.metaKey||e.ctrlKey) && e.key === 'Enter') savePrompt();
  if ((e.metaKey||e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('search').focus();
  }
});

init();
</script>
</body>
</html>
